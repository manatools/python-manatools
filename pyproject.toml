[tool.poetry]
name = "python-manatools"
version = "0.99.2"
description = "Framework to build ManaTools applications"
license = "LGPL-2.1-or-later"
readme = "README.md"
homepage = "https://github.com/manatools/python-manatools"
repository = "https://github.com/manatools/python-manatools"

authors = [
   "Angelo Naselli <anaselli@linux.it>",
]
maintainers = [
   "Angelo Naselli <anaselli@linux.it>",
   "Neal Gompa <neal@gompa.dev>",
]

packages = [
   { include = "manatools"},
]

include = [
   # Compiled .mo translation files — generated by build.py during wheel build
   # (Poetry build hook).  Bundled inside manatools/locale/ in the wheel so that
   # pip / virtualenv installs get translations via importlib.resources.
   # Packagers installing to /usr/share/locale should use tools/po-compile.sh.
   { path = "share/locale/**/*.mo", format = "wheel" },
   { path = "NEWS", format = "sdist" },
]

# build.py is invoked by Poetry before assembling the wheel.
# It compiles po/*.po → manatools/locale/<lang>/LC_MESSAGES/python-manatools.mo.
build = "po_build.py"

classifiers = [
   # classifier: http://pypi.python.org/pypi?%3Aaction=list_classifiers
   "Development Status :: 3 - Alpha",
   "Intended Audience :: Developers",
   "Operating System :: POSIX :: Linux",
   "Topic :: System :: Operating System",
]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/manatools/python-manatools/issues"

[tool.poetry.dependencies]
python = "^3.9"
dbus-python = "*"
python-gettext = "*"
PyYAML = "*"

# Optional dependencies for gui backend extras
PySide6 = { version = ">=6.5", optional = true }
PyCairo = { version = "*", optional = true }
PyGObject = { version = ">=3.42", optional = true }

[tool.poetry.extras]
qt = [ "PySide6" ]
gtk = [ "PyCairo", "PyGObject" ]

[build-system]
requires = ["poetry-core>=1.2.0"]
build-backend = "poetry.core.masonry.api"
